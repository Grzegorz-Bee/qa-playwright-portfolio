name: Scheduled E2E Tests

on:
  schedule:
    # Run every day at 6:00 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
    - name: Upload Playwright report
      id: playwright-report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    - name: Add Playwright report to run summary
      if: always()
      run: |
        echo "## 🎭 Playwright Report" >> $GITHUB_STEP_SUMMARY
        echo "[Download HTML Report](../artifacts/playwright-report)" >> $GITHUB_STEP_SUMMARY
